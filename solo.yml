name: autoblog
icon: null
processes:
  Pail:
    command: php artisan pail
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Queue:
    command: php artisan queue:listen
    working_dir: null
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  'npm: dev':
    command: npm run dev
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
